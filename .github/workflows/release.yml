name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i tailwind.css -o packages/desktop/assets/tailwind.css --minify

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache dx CLI
        id: cache-dx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/dx.exe
          key: dx-cli-0.7.1-windows

      - name: Install dx CLI
        if: steps.cache-dx.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli@0.7.1 --locked

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Build release
        working-directory: packages/desktop
        run: dx build --release

      - name: Find and rename executable
        id: find_exe
        shell: bash
        run: |
          EXE_PATH=$(find target/dx/desktop -name "*.exe" -path "*/release/*" | head -1)
          if [ -z "$EXE_PATH" ]; then
            echo "ERROR: No exe found in target/dx/desktop"
            find target/dx/ -name "*.exe" || true
            exit 1
          fi
          TAG="${GITHUB_REF_NAME}"
          cp "$EXE_PATH" "win_aide-${TAG}.exe"
          echo "exe_name=win_aide-${TAG}.exe" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.exe_name }}
          generate_release_notes: true
